name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          touch _site/.nojekyll
          cp index.html _site/
          cp script.js _site/
          cp style.css _site/
          cp tokens.css _site/
          cp -r img _site/
          cp -r "reference images" _site/ || true
          mkdir -p _site/storybook
          cp -r storybook-static/* _site/storybook/
          echo "Contents of _site:"
          ls -la _site/
          echo "Contents of _site/storybook:"
          ls -la _site/storybook/ | head -20

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
